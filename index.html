        function analyzeMedicalRoots(word) {
            const lower = word.toLowerCase();
            let matches = [];
            
            medicalRootsDB.forEach(item => {
                const r = item.root;
                if (lower.includes(r)) {
                    if (r.length <= 3) {
                        if ((item.type.includes("前缀") && lower.startsWith(r)) || 
                            (item.type.includes("后缀") && lower.endsWith(r)) ||
                            (!item.type.includes("前缀") && !item.type.includes("后缀"))) {
                            matches.push(item);
                        }
                    } else {
                        matches.push(item);
                    }
                }
            });

            matches.sort((a, b) => {
                const posA = lower.indexOf(a.root);
                const posB = lower.indexOf(b.root);
                if (posA !== posB) return posA - posB;
                return b.root.length - a.root.length;
            });

            let filtered = [];
            let occupied = new Array(lower.length).fill(false);
            matches.forEach(m => {
                const idx = lower.indexOf(m.root);
                let canAdd = true;
                for(let i = idx; i < idx + m.root.length; i++) {
                    if(occupied[i]) canAdd = false;
                }
                if(canAdd) {
                    filtered.push(m);
                    for(let i = idx; i < idx + m.root.length; i++) {
                        occupied[i] = true;
                    }
                }
            });

            if (filtered.length === 0) return { html: "无显着拉丁/希腊医学词根（或为基础英语词汇）", text: "基础词或无显着词根" };

            const html = filtered.map(m => `<span class="bg-amber-100 text-amber-900 border border-amber-300 px-1.5 py-0.5 rounded inline-block font-semibold my-0.5 shadow-2xs">${m.root}- (<span class="text-amber-700">${m.meaning}</span>)</span>`).join(' <span class="text-amber-500 font-bold">➔</span> ');
            const text = filtered.map(m => `${m.root}(${m.meaning})`).join(" -> ");
            return { html, text };
        }

            renderParallelText(sampleMedicalText);

        function initHorizontalResizer() {
            const resizer = document.getElementById('resizer');
            const leftPanel = document.getElementById('left-panel');
            let isResizing = false;

            resizer.addEventListener('mousedown', () => {
                isResizing = true;
                resizer.classList.add('resizing');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const containerWidth = document.querySelector('main').clientWidth;
                let newLeftWidth = (e.clientX / containerWidth) * 100;
                if (newLeftWidth < 20) newLeftWidth = 20;
                if (newLeftWidth > 80) newLeftWidth = 80;
                leftPanel.style.width = `${newLeftWidth}%`;
            });

            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizer.classList.remove('resizing');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        function initVerticalResizers() {
            const rightPanel = document.getElementById('right-panel');
            const topEl = document.getElementById('right-top');
            const midEl = document.getElementById('right-mid');
            const botEl = document.getElementById('right-bot');
            const resizerV1 = document.getElementById('resizer-v1');
            const resizerV2 = document.getElementById('resizer-v2');

            let isResizing1 = false;
            let isResizing2 = false;
            let startY = 0;
            let startTopPct = 0;
            let startMidPct = 0;
            let startBotPct = 0;

            resizerV1.addEventListener('mousedown', (e) => {
                isResizing1 = true;
                startY = e.clientY;
                const totalH = rightPanel.clientHeight;
                startTopPct = (topEl.clientHeight / totalH) * 100;
                startMidPct = (midEl.clientHeight / totalH) * 100;
                resizerV1.classList.add('resizing');
                document.body.style.cursor = 'row-resize';
                document.body.style.userSelect = 'none';
            });

            resizerV2.addEventListener('mousedown', (e) => {
                isResizing2 = true;
                startY = e.clientY;
                const totalH = rightPanel.clientHeight;
                startMidPct = (midEl.clientHeight / totalH) * 100;
                startBotPct = (botEl.clientHeight / totalH) * 100;
                resizerV2.classList.add('resizing');
                document.body.style.cursor = 'row-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing1 && !isResizing2) return;
                const totalH = rightPanel.clientHeight;
                const deltaPct = ((e.clientY - startY) / totalH) * 100;

                if (isResizing1) {
                    const combined = startTopPct + startMidPct;
                    let newTop = startTopPct + deltaPct;
                    if (newTop < 15) newTop = 15;
                    if (newTop > combined - 15) newTop = combined - 15;
                    let newMid = combined - newTop;
                    topEl.style.height = `${newTop}%`;
                    midEl.style.height = `${newMid}%`;
                }

                if (isResizing2) {
                    const combined = startMidPct + startBotPct;
                    let newMid = startMidPct + deltaPct;
                    if (newMid < 15) newMid = 15;
                    if (newMid > combined - 15) newMid = combined - 15;
                    let newBot = combined - newMid;
                    midEl.style.height = `${newMid}%`;
                    botEl.style.height = `${newBot}%`;
                }
            });

            document.addEventListener('mouseup', () => {
                if (isResizing1 || isResizing2) {
                    isResizing1 = false;
                    isResizing2 = false;
                    resizerV1.classList.remove('resizing');
                    resizerV2.classList.remove('resizing');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        // --- 核心突破：多源跨域自动降级翻译引擎 (全面攻克 GitHub Pages 拦截) ---
        async function fetchChineseTranslation(text) {
            const isSingleWord = text.split(' ').length === 1;

            // 通道1：优先尝试直接请求谷歌翻译 (本地或未拦截时最快)
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&dt=bd&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    let result = data[0].map(item => item[0]).join('');
                    if (data[1] && data[1].length > 0 && isSingleWord) {
                        const detailed = data[1].map(pos => `${pos[0]}: ${pos[1].slice(0, 3).join(', ')}`).join('； ');
                        if (detailed) result = detailed;
                    }
                    if (result) return result;
                }
            } catch (e) {
                console.warn("直连谷歌翻译遇跨域拦截，正在启用代理中转...");
            }

            // 通道2：通过开源免费跨域中转服务器 (AllOrigins) 抓取谷歌数据
            try {
                const googleUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&dt=bd&q=${encodeURIComponent(text)}`;
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(googleUrl)}`;
                const res = await fetch(proxyUrl);
                if (res.ok) {
                    const data = await res.json();
                    let result = data[0].map(item => item[0]).join('');
                    if (data[1] && data[1].length > 0 && isSingleWord) {
                        const detailed = data[1].map(pos => `${pos[0]}: ${pos[1].slice(0, 3).join(', ')}`).join('； ');
                        if (detailed) result = detailed;
                    }
                    if (result) return result;
                }
            } catch (e) {
                console.warn("跨域代理中转超时，启用官方开放 API 兜底...");
            }

            // 通道3：原生支持跨域 CORS 的免费翻译接口 MyMemory API
            try {
                const mmUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-CN`;
                const res = await fetch(mmUrl);
                if (res.ok) {
                    const data = await res.json();
                    if (data.responseData && data.responseData.translatedText) {
                        return data.responseData.translatedText;
                    }
                }
            } catch (e) {}

            return "网络跨域受限或响应超时，请确认网络环境";
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('file-name').innerText = file.name;
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('pdf-container').classList.remove('hidden');

            const fileReader = new FileReader();
            fileReader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                    pdfDoc = pdf;
                    document.getElementById('page-num').innerText = `1 / ${pdf.numPages}`;
                    document.getElementById('prev-page').disabled = false;
                    document.getElementById('next-page').disabled = false;
                    pageNum = 1;
                    renderPage(pageNum);
                });
            };
            fileReader.readAsArrayBuffer(file);
        }

        function renderPage(num) {
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({scale: scale});
                const canvas = document.getElementById('pdf-canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                page.render({ canvasContext: context, viewport: viewport });

                page.getTextContent().then(function(textContent) {
                    let pageText = "";
                    textContent.items.forEach(item => { pageText += item.str + " "; });
                    renderParallelText(pageText);
                });

                document.getElementById('page-num').innerText = `${num} / ${pdfDoc.numPages}`;
            });
        }

        function renderParallelText(text) {
            const container = document.getElementById('parallel-content');
            container.innerHTML = '';
            const rawSentences = text.match(/[^.!?]+[.!?]+/g) || [text];
            
            currentSentences = [];

            rawSentences.forEach((rawSentence) => {
                const cleanSentence = rawSentence.trim().replace(/\s+/g, ' ');
                if(!cleanSentence) return;
                currentSentences.push(cleanSentence);
            });

            currentSentences.forEach((sentence, index) => {
                const div = document.createElement('div');
                div.className = "p-2.5 hover:bg-slate-50 border-l-2 border-transparent hover:border-blue-500 transition rounded";
                
                const words = sentence.split(' ');
                const wordsHtml = words.map(word => {
                    const cleanWord = word.replace(/[^a-zA-Z\-]/g, '');
                    return `<span class="word-interactive cursor-pointer text-slate-800 font-medium" onclick="handleWordClick(event, '${cleanWord}')">${word}</span>`;
                }).join(' ');

                div.innerHTML = `
                    <div class="mb-1 leading-normal text-base">${wordsHtml}</div>
                    <div id="trans-${index}" class="text-xs text-slate-600 bg-amber-50 border border-amber-100 p-2 rounded hidden font-sans mt-1">正在呼叫中文翻译接口...</div>
                    <div class="flex space-x-4 mt-2">
                        <button onclick="translateSentence(${index})" class="text-xs text-blue-600 hover:underline flex items-center font-medium">🌐 显示/隐藏中文翻译</button>
                        <button onclick="speakSentence(${index})" class="text-xs text-green-600 hover:underline flex items-center font-medium">🔊 朗读整句</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function handleWordClick(event, word) {
            event.stopPropagation();
            if (!word) return;

            speakText(word, true);
            const rootsObj = analyzeMedicalRoots(word);

            const panel = document.getElementById('word-panel');
            panel.className = "flex-1 flex flex-col justify-between bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-slate-800 min-h-[100px]";
            panel.innerHTML = `
                <div class="flex justify-between items-start border-b border-yellow-200 pb-2 mb-1.5 shrink-0">
                    <div>
                        <span class="text-xl font-bold text-slate-900">${word}</span>
                        <span id="word-ipa" class="text-sm font-mono text-slate-500 ml-2">正在获取音标...</span>
                    </div>
                    <button onclick="speakText('${word}', true)" class="bg-yellow-400 hover:bg-yellow-300 text-yellow-900 text-xs px-2.5 py-1 rounded font-semibold flex items-center shadow-2xs">🔊 慢速发音</button>
                </div>
                <div class="space-y-2 overflow-y-auto flex-1 pr-1 text-xs leading-relaxed my-1">
                    <div class="flex items-baseline bg-amber-50/80 p-1.5 rounded border border-amber-200/60">
                        <span class="font-bold text-amber-800 shrink-0 text-xs">【词根】</span>
                        <span class="ml-2 leading-normal text-xs">${rootsObj.html}</span>
                    </div>
                    <div class="flex items-baseline pt-0.5">
                        <span class="font-bold text-slate-500 shrink-0 text-xs">【中文】</span>
                        <span id="word-def-cn" class="font-bold text-blue-700 ml-2 text-sm">正在多源通道请求翻译...</span>
                    </div>
                    <div class="flex items-baseline pt-0.5">
                        <span class="font-bold text-slate-500 shrink-0 text-xs">【英文】</span>
                        <span id="word-def-en" class="text-slate-700 ml-2 text-xs">正在查询原版词典...</span>
                    </div>
                </div>
                <div class="flex justify-end pt-2 mt-1 border-t border-yellow-200 shrink-0">
                    <button onclick="addToVocab('${word}')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white px-3 py-1 rounded flex items-center shadow-2xs font-medium">+ 加入生词记忆本</button>
                </div>
            `;

            let chineseDef = "翻译失败或无释义";
            let englishDef = "专业医学合成词，词典暂无简明英释";
            let phonetic = "/ - /";

            // 1. 获取中文释义 (调用多源自动降级引擎)
            chineseDef = await fetchChineseTranslation(word);

            // 2. 获取英文释义和音标 (同步增加代理中转防跨域)
            try {
                let dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (!dictRes.ok) {
                    dictRes = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://api.dictionaryapi.dev/api/v2/entries/en/' + word)}`);
                }
                if (dictRes.ok) {
                    const dictData = await dictRes.json();
                    phonetic = dictData[0].phonetics.find(p => p.text)?.text || dictData[0].phonetic || "/ - /";
                    englishDef = dictData[0].meanings[0]?.definitions[0]?.definition || "暂无英文原版简明定义";
                }
            } catch (e) {}

            document.getElementById('word-ipa').innerText = phonetic;
            document.getElementById('word-def-cn').innerText = chineseDef;
            document.getElementById('word-def-en').innerText = englishDef;
            panel.dataset.ipa = phonetic;
            panel.dataset.defCn = chineseDef;
            panel.dataset.defEn = englishDef;
            panel.dataset.roots = rootsObj.text;
        }

        async function translateSentence(index) {
            const transDiv = document.getElementById(`trans-${index}`);
            if (!transDiv.classList.contains('hidden')) {
                transDiv.classList.add('hidden');
                return;
            }
            transDiv.classList.remove('hidden');

            if (transDiv.dataset.translated === "true") return;

            transDiv.innerText = "正在通过跨域中转通道拉取高质量医学汉化...";
            const translation = await fetchChineseTranslation(currentSentences[index]);
            transDiv.innerText = translation;
            transDiv.dataset.translated = "true";
        }

        function speakSentence(index) {
            if (currentSentences[index]) {
                speakText(currentSentences[index], false);
            }
        }

        function speakText(text, forceSlow = false) {
            if (!('speechSynthesis' in window)) {
                alert("您当前的浏览器不支持语音合成，请使用 Chrome 或 Edge 浏览器。");
                return;
            }
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = (forceSlow && isSlowSpeed) ? 0.75 : (isSlowSpeed ? 0.75 : 1.0);
            
            const voices = window.speechSynthesis.getVoices();
            const naturalVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Natural') || v.name.includes('Samantha') || v.name.includes('Zira')));
            if (naturalVoice) utterance.voice = naturalVoice;

            window.speechSynthesis.speak(utterance);
        }

        function addToVocab(word) {
            const panel = document.getElementById('word-panel');
            const ipa = panel.dataset.ipa || "";
            const defCn = panel.dataset.defCn || "自行翻译";
            const defEn = panel.dataset.defEn || "暂无英文定义";
            const roots = panel.dataset.roots || "无显着词根";

            if (!vocabList.some(item => item.word === word)) {
                vocabList.unshift({ word, ipa, defCn, defEn, roots, time: new Date().toLocaleDateString() });
                localStorage.setItem('medical_vocab', JSON.stringify(vocabList));
                updateVocabUI();
            }
        }

        function removeVocab(word) {
            vocabList = vocabList.filter(item => item.word !== word);
            localStorage.setItem('medical_vocab', JSON.stringify(vocabList));
            updateVocabUI();
        }

        function updateVocabUI() {
            document.getElementById('vocab-count').innerText = vocabList.length;
            const list = document.getElementById('vocab-list');
            list.innerHTML = '';
            
            vocabList.forEach(item => {
                const cn = item.defCn || item.def || "无";
                const roots = item.roots || "基础词";
                
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-slate-50 p-2 rounded text-xs border border-slate-100 hover:border-slate-300 transition";
                div.innerHTML = `
                    <div class="flex items-center space-x-2 overflow-hidden flex-1 mr-2">
                        <button onclick="speakText('${item.word}', true)" class="text-blue-500 hover:text-blue-700 font-bold shrink-0 text-sm">🔊</button>
                        <span class="font-bold text-slate-800 shrink-0 text-sm">${item.word}</span>
                        <span class="text-[11px] text-slate-400 font-mono shrink-0">${item.ipa}</span>
                        <span class="text-amber-800 bg-amber-100/80 px-1.5 py-0.5 rounded text-[10px] shrink-0 font-medium">[根] ${roots}</span>
                        <span class="text-blue-700 font-medium truncate shrink-0 ml-1 text-xs">[中] ${cn}</span>
                    </div>
                    <button onclick="removeVocab('${item.word}')" class="text-slate-400 hover:text-red-500 shrink-0 text-base font-bold px-1">×</button>
                `;
                list.appendChild(div);
            });
        }

        function exportVocab() {
            if (vocabList.length === 0) {
                alert("生词本为空，请先在阅读中采集词汇。");
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF单词,音标,词根拆解,中文释义,英文原版释义,收录时间\n";
            vocabList.forEach(item => {
                const cn = (item.defCn || item.def || "").replace(/"/g, '""');
                const en = (item.defEn || "").replace(/"/g, '""');
                const roots = (item.roots || "").replace(/"/g, '""');
                csvContent += `"${item.word}","${item.ipa}","${roots}","${cn}","${en}","${item.time}"\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `医学生词构词双语本_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
